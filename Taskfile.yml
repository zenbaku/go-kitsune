version: "3"

includes:
  engine:
    taskfile: ./engine/Taskfile.yml
    dir: ./engine

vars:
  PACKAGE: ./...

tasks:
  default:
    desc: Build, lint, and test
    cmds:
      - task: fmt
      - task: vet
      - task: test

  build:
    desc: Compile the package
    cmds:
      - go build {{.PACKAGE}}

  fmt:
    desc: Format source files
    cmds:
      - go fmt {{.PACKAGE}}

  vet:
    desc: Run go vet
    cmds:
      - go vet {{.PACKAGE}}

  test:
    desc: Run tests (fast; skips example smoke tests — use test:examples for those)
    cmds:
      - go test -short -count=1 -timeout 30s {{.PACKAGE}}

  test:verbose:
    desc: Run tests with verbose output (fast; skips example smoke tests)
    cmds:
      - go test -short -v -count=1 -timeout 30s {{.PACKAGE}}

  test:race:
    desc: Run tests with race detector (fast; skips example smoke tests)
    cmds:
      - go test -short -race -count=1 -timeout 60s {{.PACKAGE}}

  test:cover:
    desc: Run tests and show coverage (fast; skips example smoke tests)
    cmds:
      - go test -short -coverprofile=coverage.out -count=1 -timeout 30s {{.PACKAGE}}
      - go tool cover -func=coverage.out
      - rm -f coverage.out

  test:ext:
    desc: Run tail tests (kredis, ksqlite, kfile, khttp)
    cmds:
      - for: [kredis, ksqlite, kfile, khttp, kotel, kprometheus, knats, kpubsub, kgrpc, ksqs, kdatadog, kmongo, kclickhouse, kwebsocket, kmqtt, kkinesis, kpulsar, kes, kdynamo, kgcs, kazsb, kazeh]
        cmd: echo "=== tails/{{.ITEM}} ===" && cd tails/{{.ITEM}} && go test -race -count=1 -timeout 30s ./...

  test:fuzz:
    desc: Run fuzz seed corpus only (fast; use fuzz:* tasks to actively search for bugs)
    cmds:
      - go test -run='FuzzOutboxDrop' -race ./engine/
      - go test -run='FuzzPipeline' .

  fuzz:outbox-drop-newest:
    desc: Fuzz the drop-newest outbox under concurrent senders (FUZZ_TIME default 5m)
    vars:
      FUZZ_TIME: '{{default "5m" .FUZZ_TIME}}'
    cmds:
      - go test -fuzz=FuzzOutboxDropNewest -fuzztime={{.FUZZ_TIME}} -race ./engine/

  fuzz:outbox-drop-oldest:
    desc: Fuzz the drop-oldest outbox under concurrent senders (FUZZ_TIME default 5m)
    vars:
      FUZZ_TIME: '{{default "5m" .FUZZ_TIME}}'
    cmds:
      - go test -fuzz=FuzzOutboxDropOldest -fuzztime={{.FUZZ_TIME}} -race ./engine/

  fuzz:overflow:
    desc: Fuzz pipeline Map stages across all overflow strategies (FUZZ_TIME default 5m)
    vars:
      FUZZ_TIME: '{{default "5m" .FUZZ_TIME}}'
    cmds:
      - go test -fuzz=FuzzPipelineOverflow -fuzztime={{.FUZZ_TIME}} .

  fuzz:cancellation:
    desc: Fuzz pipeline context cancellation at varying times (FUZZ_TIME default 5m)
    vars:
      FUZZ_TIME: '{{default "5m" .FUZZ_TIME}}'
    cmds:
      - go test -fuzz=FuzzPipelineCancellation -fuzztime={{.FUZZ_TIME}} .

  fuzz:multi-stage:
    desc: Fuzz the scheduler across multi-stage pipelines (FUZZ_TIME default 5m)
    vars:
      FUZZ_TIME: '{{default "5m" .FUZZ_TIME}}'
    cmds:
      - go test -fuzz=FuzzPipelineMultiStage -fuzztime={{.FUZZ_TIME}} .

  fuzz:all:
    desc: Run all fuzz targets sequentially (FUZZ_TIME default 5m each; good for nightly CI)
    vars:
      FUZZ_TIME: '{{default "5m" .FUZZ_TIME}}'
    cmds:
      - task: fuzz:outbox-drop-newest
        vars: { FUZZ_TIME: "{{.FUZZ_TIME}}" }
      - task: fuzz:outbox-drop-oldest
        vars: { FUZZ_TIME: "{{.FUZZ_TIME}}" }
      - task: fuzz:overflow
        vars: { FUZZ_TIME: "{{.FUZZ_TIME}}" }
      - task: fuzz:cancellation
        vars: { FUZZ_TIME: "{{.FUZZ_TIME}}" }
      - task: fuzz:multi-stage
        vars: { FUZZ_TIME: "{{.FUZZ_TIME}}" }

  bench:
    desc: Run benchmarks
    cmds:
      - go test -bench=. -benchmem -count=1 -timeout 60s ./...

  bench:compare:
    desc: Run comparison benchmarks (Kitsune vs raw goroutines, conc, go-streams)
    dir: bench
    cmds:
      - go test -bench=. -benchmem -count=5 -timeout 300s ./...

  test:examples:
    desc: Build and run all examples (skips redis tail if unavailable)
    cmds:
      # Root-module examples — run via go test -run TestExamples (parallel, cached builds).
      - go test -v -run TestExamples -timeout 120s -count=1 .
      # Tail examples — own go.mod, run directly.
      - for: [files, sqlite, http, prometheus, websocket]
        cmd: cd examples/{{.ITEM}} && go run . > /dev/null 2>&1 && echo "PASS examples/{{.ITEM}}" || (echo "FAIL examples/{{.ITEM}}" && exit 1)
      # Redis tail example — only if Redis is reachable.
      - redis-cli ping > /dev/null 2>&1 && (cd examples/redis && go run . > /dev/null 2>&1 && echo "PASS examples/redis") || echo "SKIP examples/redis (Redis not available)"

  test:all:
    desc: Run core + tail + example tests
    cmds:
      - task: test:race
      - task: test:ext
      - task: test:examples

  examples:
    desc: Run all examples
    cmds:
      - for: [basic, filter, batch, flatmap, fanout, errors, state, compose, generate, concurrent, window, broadcast, dedupe, iter, metrics, supervise, overflow, channel, collectors, concatmap, groupby, mapresult, pairwise, reduce, scan, slidingwindow, stages, ticker, timebased, timeout, withlatestfrom, circuitbreaker, metricsapi, pool, ratelimit, switchmap, exhaustmap, combinelatest, balance, testclock, mapwithkey]
        cmd: echo "=== {{.ITEM}} ===" && go run ./examples/{{.ITEM}}
      - for: [files, redis, sqlite, http]
        cmd: echo "=== {{.ITEM}} ===" && cd examples/{{.ITEM}} && go run .

  inspector:
    desc: Launch the live inspector dashboard (opens a pipeline in your browser)
    cmds:
      - go run ./examples/inspector

  ci:
    desc: Full CI check (fmt, vet, race tests, tails)
    cmds:
      - task: fmt
      - task: vet
      - task: test:all
