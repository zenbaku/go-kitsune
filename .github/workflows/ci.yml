name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.23", "1.24", "1.25", "stable"]

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Core — fmt, vet, race tests
        run: |
          go fmt ./...
          go vet ./...
          go test -short -race -count=1 -timeout 60s ./...

      - name: Allocation regression tests
        run: go test -run TestAllocBounds -count=1 -timeout 30s ./...

      - name: Examples — smoke test all runnable examples
        run: go test -v -run TestExamples -timeout 120s -count=1 .

      - name: tails/kredis — Redis e2e tests
        run: cd tails/kredis && go test -race -count=1 -timeout 30s ./...

      - name: tails/ksqlite — SQLite tests
        run: cd tails/ksqlite && go test -race -count=1 -timeout 30s ./...

      - name: tails/kfile — file/CSV/JSON tests
        run: cd tails/kfile && go test -race -count=1 -timeout 30s ./...

      - name: tails/khttp — HTTP tests
        run: cd tails/khttp && go test -race -count=1 -timeout 30s ./...

      - name: tails/kotel — OpenTelemetry tests
        run: cd tails/kotel && go test -race -count=1 -timeout 30s ./...

  bench:
    name: Benchmark regression check
    runs-on: ubuntu-latest
    # Only run on pull requests to avoid burning CI time on every push to main.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmarks on PR branch
        run: task bench:current

      - name: Compare against baseline
        run: task bench:compare

      - name: Fail on regression > 15%
        run: go run ./internal/tools/benchcheck -threshold=15 testdata/bench/baseline.txt testdata/bench/current.txt

      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchstat-results
          path: testdata/bench/current.txt
