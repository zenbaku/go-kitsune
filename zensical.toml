[project]
site_name = "Kitsune"
site_url = "https://zenbaku.github.io/go-kitsune"
site_description = "Type-safe, concurrent data pipelines for Go"
docs_dir = "doc"
repo_url = "https://github.com/zenbaku/go-kitsune"
repo_name = "zenbaku/go-kitsune"
nav = [
  {"Home" = "index.md"},
  {"Getting Started" = "getting-started.md"},
  {"Features" = "features.md"},
  {"Operators" = "operators.md"},
  {"API Matrix" = "api-matrix.md"},
  {"Options" = "options.md"},
  {"Tails" = "tails.md"},
  {"Inspector" = "inspector.md"},
  {"Examples" = "examples.md"},
  {"Guides" = [
    {"Testing" = "testing.md"},
    {"Tuning" = "tuning.md"},
    {"Benchmarks" = "benchmarks.md"},
    {"Internals" = "internals.md"},
    {"Comparison" = "comparison.md"},
  ]},
  {"Roadmap" = "roadmap.md"},
  {"GitHub" = "https://github.com/zenbaku/go-kitsune"},
]

[project.theme]
logo = "go-kitsune-icon.png"
favicon = "go-kitsune-icon.png"

[project.theme.icon]
repo = "fontawesome/brands/github"

[[project.theme.palette]]
scheme = "default"
primary = "deep-orange"
accent = "deep-orange"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "deep-orange"
accent = "deep-orange"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
pygments_lang_class = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  {name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format"},
]

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
